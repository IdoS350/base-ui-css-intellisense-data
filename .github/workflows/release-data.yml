name: Publish Data Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Base UI version (e.g. 1.2.3)'
        required: true
        default: 'latest'

jobs:
  release:
    name: Create data release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Resolve Base UI version
        id: resolve
        run: |
          if [ "${{ inputs.version }}" != "latest" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            latest=$(gh release view --repo mui/base-ui --json tagName -q '.tagName | ltrimstr("v")')
            echo "version=$latest" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout extension repo (for generator)
        uses: actions/checkout@v6
        with:
          repository: IdoS350/base-ui-css-intellisense
          path: extension

      - uses: pnpm/action-setup@v6
        with:
          package_json_file: extension/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: extension/pnpm-lock.yaml

      - name: Install extension dependencies
        run: pnpm install --frozen-lockfile
        working-directory: extension

      - name: Clone Base UI at tag
        run: |
          git clone --depth 1 --branch v${{ steps.resolve.outputs.version }} \
            https://github.com/mui/base-ui.git /tmp/base-ui

      - name: Generate data
        run: pnpm generate /tmp/base-ui
        working-directory: extension

      - name: Create GitHub release with data asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "base-ui-v${{ steps.resolve.outputs.version }}" \
            --title "Base UI data v${{ steps.resolve.outputs.version }}" \
            --notes "Autocomplete data generated from Base UI v${{ steps.resolve.outputs.version }}." \
            extension/data/base-ui-attributes.json
